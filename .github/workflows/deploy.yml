name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_PORT }} \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              'set -e
               REPO=/opt/vt-clickfix-vmray
               if [ -d "$REPO/.git" ]; then
                 git -C "$REPO" fetch origin main
                 git -C "$REPO" reset --hard origin/main
               else
                 git clone https://github.com/tolstuun/vt-clickfix-vmray.git "$REPO"
               fi
               cd "$REPO"
               # Ensure .env exists so docker compose env_file never fails.
               # Real secrets are added manually; an empty file means the app
               # starts without credentials (all features guarded by is_configured).
               [ -f .env ] || touch .env
               docker compose up -d --build'

      - name: Health check
        run: |
          sleep 10
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_PORT }} \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              'set -e
               cd /opt/vt-clickfix-vmray
               curl -sf --retry 5 --retry-delay 3 http://localhost:8001/health
               docker compose exec -T app test -f alembic.ini
               curl -sf -X POST http://localhost:8001/internal/vt/poll
               curl -sf -X POST http://localhost:8001/internal/vmray/poll
               echo "=== stats/summary ===" && curl -s http://localhost:8001/stats/summary'
